# OpenSearch Development Setup
# Single-node cluster for learning and development
# Usage: docker-compose up -d

version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────────
  # OpenSearch Node - Search & Analytics Engine
  # ─────────────────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: opensearch-node
    environment:
      # Cluster configuration
      - cluster.name=opensearch-demo
      - node.name=opensearch-node
      - discovery.type=single-node
      
      # Disable security for development (NOT for production!)
      - plugins.security.disabled=true
      
      # Memory settings (adjust based on your system)
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      
      # Bootstrap checks
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"    # REST API
      - "9600:9600"    # Performance Analyzer
    networks:
      - opensearch-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────────────────────────
  # OpenSearch Dashboards - Visualization UI
  # ─────────────────────────────────────────────────────────────────
  dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.1
    container_name: opensearch-dashboards
    environment:
      # Connect to OpenSearch
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      
      # Disable security for development
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    networks:
      - opensearch-net
    depends_on:
      opensearch:
        condition: service_healthy

networks:
  opensearch-net:
    driver: bridge

volumes:
  opensearch-data:
    driver: local
